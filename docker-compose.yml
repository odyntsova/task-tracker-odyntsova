# Full local/production-like stack: PostgreSQL + backend API + frontend (nginx).
#   docker compose up --build
#   frontend → http://localhost:8080   (proxies /api to the backend)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tracker']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://tracker:tracker@db:5432/tracker
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: http://localhost:8080
      NODE_ENV: production
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '4000:4000'

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  pgdata:
